[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]
preview = ["pixi-build"]

[dependencies]
pytest = ">=8.0.0"
ruff = ">=0.6.0"
pixi-ros = { path = "." }
tbump = ">=6.9.0,<7"

[tasks]
test = "pytest tests/ -v"
lint = "ruff check src/"
fmt = "ruff format src/"
check = {depends-on = ["fmt", "lint", "test"]}
bump = "tbump --no-push --no-tag --non-interactive"

[package.build.backend]
name = "pixi-build-python"
version = ">=0.4"

[package.build.config]
ignore-pypi-mapping = false  # Enable automatic PyPI-to-conda mapping